name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm i -g pnpm@9

      - name: Build and package
        run: node scripts/deploy.mjs

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
